<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-toggle">
                <button type="button" id="theme-toggle-btn" class="theme-toggle-btn" aria-label="Toggle theme">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
            <h1>Expense & Budget Visualizer</h1>
            <div class="balance-container">
                <div id="balance-display" class="balance-display">
                    <span class="balance-label">Total Spending:</span>
                    <span id="balance-amount" class="balance-amount">$0.00</span>
                </div>
                <div class="month-selector">
                    <button id="prev-month" class="btn-month-nav">←</button>
                    <span id="current-month" class="current-month">All Time</span>
                    <button id="next-month" class="btn-month-nav">→</button>
                    <button id="reset-month" class="btn-reset-month">All Time</button>
                </div>
            </div>
        </header>

        <main>
            <section class="input-section">
                <h2>Add New Expense</h2>
                <form id="expense-form">
                    <div class="form-group">
                        <label for="item-name">Item Name</label>
                        <input type="text" id="item-name" name="itemName" placeholder="e.g., Grocery Shopping">
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00">
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <div class="category-input-wrapper">
                            <select id="category" name="category">
                                <option value="">Select a category</option>
                                <option value="Food">Food</option>
                                <option value="Transport">Transport</option>
                                <option value="Fun">Fun</option>
                            </select>
                            <button type="button" id="add-category-btn" class="btn-add-category">+ Add New</button>
                        </div>
                    </div>
                    <div id="error-message" class="error-message"></div>
                    <button type="submit" class="btn-submit">Add Expense</button>
                </form>
            </section>

            <!-- Category Management Section -->
            <section class="category-section">
                <h2>Manage Categories</h2>
                <div class="category-list" id="category-list">
                    <!-- Categories will be rendered here -->
                </div>
            </section>

            <!-- Monthly Summary Section -->
            <section class="monthly-summary-section">
                <h2>Monthly Summary</h2>
                <div id="monthly-summary" class="monthly-summary-grid">
                    <!-- Monthly summary cards will be rendered here -->
                </div>
            </section>

            <section class="visualization-section">
                <div class="transactions-container">
                    <div class="transactions-header">
                        <h2>Transaction History</h2>
                        <div class="sort-controls">
                            <label for="sort-select">Sort by:</label>
                            <select id="sort-select" class="sort-select">
                                <option value="date">Date (Newest)</option>
                                <option value="amount">Amount (Highest)</option>
                                <option value="category">Category (A-Z)</option>
                                <option value="name">Name (A-Z)</option>
                            </select>
                        </div>
                    </div>
                    <div id="transaction-list" class="transaction-list">
                        <!-- Transactions will be rendered here -->
                    </div>
                </div>

                <div class="chart-container">
                    <h2>Spending by Category</h2>
                    <div id="chart-wrapper">
                        <canvas id="expense-chart"></canvas>
                        <div id="chart-empty-state" class="chart-empty-state">
                            No transactions yet. Add some expenses to see your spending breakdown.
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
